name: SMSF-CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run build & push smsf-be image
        working-directory: ./smsf-be
        run: |
          chmod +x ./script/docker/run-build-image.sh
          ./script/docker/run-build-image.sh

      - name: Run build & push smsf-fe image
        working-directory: ./smsf-fe
        env:
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          chmod +x ./script/docker/run-build-image.sh
          ./script/docker/run-build-image.sh
          
      - name: SSH to VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/smsf 
            docker compose pull
            docker compose up -d
            docker image prune -f
