version: "3.8"

services:

  es-smsf:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: es-smsf
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9201:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elastic

  kibana-smsf:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana-smsf
    depends_on:
      - es-smsf
    environment:
      - ELASTICSEARCH_HOSTS=http://es-smsf:9200
    ports:
      - "5603:5601"
    networks:
      - elastic

  jaeger-smsf:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger-smsf
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"
      - "4317:4317"
      - "14250:14250"
    networks:
      - elastic

volumes:
  es_data:

networks:
  elastic: