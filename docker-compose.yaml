services:
  smsf-be:
    image: tranhuuphuoc22/hthouse:smsf-be-1.0
    container_name: smsf-be
    restart: unless-stopped
    env_file: 
      - ./smsf-be/.env
    expose:
      - "3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - smsf-network

  smsf-fe:
    image: tranhuuphuoc22/hthouse:smsf-fe-1.0
    container_name: smsf-fe
    restart: unless-stopped
    expose:
      - "3033"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - smsf-be
    networks:
      - smsf-network

  smsf-gateway:
    image: nginx:1.27-alpine
    container_name: smsf-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - smsf-fe
      - smsf-be
    networks:
      - smsf-network

networks:
  smsf-network:
    name: smsf-network
    driver: bridge
